services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: landrag
      POSTGRES_PASSWORD: landrag
      POSTGRES_DB: landrag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landrag"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  app:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://landrag:landrag@postgres:5432/landrag"
      DATABASE_URL_SYNC: "postgresql+psycopg2://landrag:landrag@postgres:5432/landrag"
      REDIS_URL: "redis://redis:6379/0"
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
